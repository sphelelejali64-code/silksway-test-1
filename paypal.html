<!-- Load the PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>

<!-- Container for the PayPal button -->
<div id="paypal-button-container"></div>

<!-- Optional: Display payment status -->
<div id="payment-status"></div>

<script>
  // Render the PayPal button
  paypal.Buttons({
    createOrder: function(data, actions) {
      // Set up the transaction
      return actions.order.create({
        purchase_units: [{
          amount: {
            value: '10.00' // Replace with your amount
          }
        }]
      });
    },
    onApprove: function(data, actions) {
      // Capture the funds from the transaction
      return actions.order.capture().then(function(details) {
        // Show a success message to the buyer
        document.getElementById('payment-status').innerHTML = `
          <h3>Payment Successful!</h3>
          <p>Transaction ID: ${details.id}</p>
          <p>Paid by: ${details.payer.name.given_name} ${details.payer.name.surname}</p>
        `;
        console.log('Transaction completed by', details.payer.name.given_name);
      });
    },
    onError: function(err) {
      // Show an error message
      document.getElementById('payment-status').innerHTML = `
        <h3>Error processing payment</h3>
        <p>${err}</p>
      `;
      console.error('Error:', err);
    }
  }).render('#paypal-button-container');
</script>
